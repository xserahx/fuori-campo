<!doctype html>
<html lang="it">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<link rel="stylesheet" href="https://use.typekit.net/wkp6gag.css">
		<title>Fuori campo</title>
		<!-- Zoom the root element so every pixel, vw, vh, and fixed position
		     operates in the 1728×1117 Figma reference frame on every device.
		     Set synchronously before first paint — no layout shift.
		     --page-zoom mirrors the zoom value for CSS touch-target compensation. -->
		<script>try{var _z=window.innerWidth/1728;document.documentElement.style.zoom=String(_z);document.documentElement.style.setProperty('--page-zoom',String(_z))}catch(e){}</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
